<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adineba Kweku</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 40px; max-width: 500px; width: 90%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .avatar { width: 100px; height: 100px; border-radius: 50%; background: #4F46E5; display: flex; align-items: center; justify-content: center; font-size: 36px; color: white; font-weight: bold; margin: 0 auto 20px; }
    h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 8px; }
    .role { color: #4F46E5; font-size: 15px; margin-bottom: 16px; font-weight: bold; }
    p { color: #555; font-size: 14px; line-height: 1.7; margin-bottom: 24px; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
    .badge { background: #EEF2FF; color: #4F46E5; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; }
    .btn { display: inline-block; background: #4F46E5; color: white; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: bold; }
    .footer { margin-top: 24px; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">AK</div>
    <h1>Adineba Kweku</h1>
    <p class="role">DevOps Engineer in Training</p>
    <p>Passionate about automation, cloud infrastructure, and continuous learning. Currently mastering Git, GitHub, GitHub Actions and cloud deployment.</p>
    <div class="badges">
      <span class="badge">Git</span>
      <span class="badge">GitHub</span>
      <span class="badge">GitHub Actions</span>
      <span class="badge">DevOps</span>
      <span class="badge">CI/CD</span>
    </div>
    <a class="btn" href="https://github.com/Adineba90">View my GitHub</a>
    <p class="footer">Deployed with GitHub Pages</p>
  </div>
</body>
</html>
